<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Verify your email</title>
</head>
<body>
    <p>Hello <strong>{{ user_name }}</strong>,</p>
    <p>Thank you for registering with LeaveDesk. Use the verification code below to activate your account:</p>
    <p style="font-size: 28px; font-weight: bold; letter-spacing: 4px; color: #2563EB;">{{ code }}</p>
    <p>This code expires in 15 minutes. If you did not create an account, you can ignore this email.</p>
    <p>
        <a href="{{ frontend_url }}/verify-email">Verify your email</a>
    </p>
    <p>Regards,<br>Employee Leave Management System</p>
</body>
</html>
